<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои сериалы</title>

<style>
:root {
  --accent: #ffb400;
  --bg: #121212;
  --card: #1e1e1e;
  --cols: 4;
}

/* СЛОЙ ЗАЩИТЫ (Экран ввода пароля) */
#lock-screen {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#pass-input {
  padding: 12px;
  border-radius: 8px;
  border: 2px solid var(--accent);
  background: #1e1e1e;
  color: white;
  text-align: center;
  font-size: 20px;
  outline: none;
  width: 200px;
  letter-spacing: 5px;
}

/* ОСНОВНОЙ КОНТЕНТ (Скрыт по умолчанию) */
#main-content {
  display: none; /* Проявится после ввода пароля */
  flex-direction: column;
  align-items: center;
  gap: 15px;
  width: 100%;
}

body {
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
  margin: 0;
}

/* ВАШИ СТИЛИ ИНТЕРФЕЙСА */
.themeBox { position: fixed; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 1001; }
select { background: #1e1e1e; color: white; border: 1px solid var(--accent); padding: 5px; border-radius: 4px; }
.searchBox { position: relative; width: 300px; }
#search { padding: 10px 35px 10px 10px; width: 100%; border-radius: 8px; border: 1px solid var(--accent); background: #1e1e1e; color: white; outline: none; }
#clearSearch { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; display: none; }
#linksContainer { display: grid; grid-template-columns: repeat(var(--cols), 1fr); gap: 10px; width: 100%; max-width: 1200px; margin-top: 20px; }
h1 { color: var(--accent); }
.button { box-sizing: border-box; background: var(--card); border: 2px solid var(--accent); color: var(--accent); padding: 15px; border-radius: 8px; transition: 0.2s; text-align: center; width: 100%; text-decoration: none; cursor: pointer; display: block; }
.button:hover { background: var(--accent); color: black; transform: scale(1.03); }
.editBtn { position: fixed; top: 15px; left: 15px; z-index: 1000; width: auto; padding: 10px 15px; }

/* Темы */
.glass .button { backdrop-filter: blur(10px); background: rgba(30,30,30,0.6); }
.neon .button { box-shadow: 0 0 10px var(--accent); }
.soft .button { border-radius: 20px; }
.minimal .button { border: none; border-bottom: 2px solid var(--accent); }
.bold .button { font-weight: bold; }
</style>
</head>

<body>

<div id="lock-screen">
  <h2 style="color: var(--accent); margin-bottom: 20px;">Введите доступ</h2>
  <input type="password" id="pass-input" placeholder="••••••" autofocus>
</div>

<div id="main-content">
    <div class="themeBox">
      <select id="colorSelect">
        <option value="#ffb400">🟠</option>
        <option value="#a855f7">🟣</option>
        <option value="#22c55e">🟢</option>
        <option value="#3b82f6">🔵</option>
        <option value="#ef4444">🔴</option>
        <option value="#ec4899">🌸</option>
      </select>
      <select id="styleSelect">
        <option value="">Default</option>
        <option value="glass">Glass</option>
        <option value="neon">Neon</option>
        <option value="soft">Soft</option>
        <option value="minimal">Minimal</option>
        <option value="bold">Bold</option>
      </select>
      <select id="colsSelect">
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </div>

    <a class="button editBtn" href="edit.html">Редактировать</a>
    
    <div style="margin-top: 60px; width: 300px;">
        <a class="button" onclick="loadFromCloud()">🔄 Обновить из облака</a>
    </div>

    <h1>Мои сериалы 🎬</h1>

    <div class="searchBox">
      <input type="text" id="search" placeholder="🔍 Поиск по названию...">
      <span id="clearSearch">✖</span>
    </div>

    <div id="linksContainer"></div>
</div>

<script>
// Настройки безопасности
const HASH = "ec626245d1646635339f40076a0862590299f9e31d459203666b60991873197f"; // Хеш для zevs105
const CLOUD_URL_BASE = "https://raw.githubusercontent.com/bucketasmr/my-serials-data/main/my-serials.json";

const lockScreen = document.getElementById('lock-screen');
const mainContent = document.getElementById('main-content');
const passInput = document.getElementById('pass-input');

// 1. ФУНКЦИИ ХЕШИРОВАНИЯ
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// 2. ПРОВЕРКА ДОСТУПА ПРИ ЗАГРУЗКЕ
window.onload = async () => {
    if (localStorage.getItem('site_auth') === 'true') {
        showApp();
    }
    applyTheme(); // Применяем тему сразу
};

// 3. ОБРАБОТКА ВВОДА ПАРОЛЯ
passInput.addEventListener('input', async () => {
    const enteredHash = await sha256(passInput.value);
    if (enteredHash === HASH) {
        localStorage.setItem('site_auth', 'true');
        showApp();
    }
});

function showApp() {
    lockScreen.style.display = 'none';
    mainContent.style.display = 'flex';
    loadFromLocal(); // Сначала грузим то, что в памяти
}

// --- ОСНОВНАЯ ЛОГИКА ПРИЛОЖЕНИЯ ---
let links = [];
const container = document.getElementById('linksContainer');
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clearSearch');

function loadFromLocal() {
    links = JSON.parse(localStorage.getItem('myLinks')) || [];
    renderLinks();
}

async function loadFromCloud() {
    try {
        const url = CLOUD_URL_BASE + "?t=" + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        links = await res.json();
        localStorage.setItem('myLinks', JSON.stringify(links));
        renderLinks();
        alert("Данные обновлены из GitHub! ☁️");
    } catch (e) {
        alert("Ошибка связи с GitHub. Использую локальные данные.");
        loadFromLocal();
    }
}

function renderLinks(filter="") {
    container.innerHTML = "";
    links.forEach(link => {
        if (!link.name.toLowerCase().includes(filter.toLowerCase())) return;
        
        const a = document.createElement('a');
        let url = link.url ? link.url.trim() : "#";
        if (url !== "#" && !/^[a-zA-Z]+:\/\//.test(url)) url = "https://" + url;
        
        a.href = url;
        a.target = "_blank";
        a.textContent = link.name;
        a.className = "button";
        
        if (url === "#") {
            a.onclick = (e) => { e.preventDefault(); alert("Ссылка отсутствует ⚠️"); };
        }
        
        container.appendChild(a);
    });
}

// Поиск
searchInput.addEventListener("input", () => {
    renderLinks(searchInput.value);
    clearBtn.style.display = searchInput.value ? "block" : "none";
});

clearBtn.onclick = () => {
    searchInput.value = "";
    clearBtn.style.display = "none";
    renderLinks("");
};

// Темы и настройки колонок
const colorSelect = document.getElementById("colorSelect");
const styleSelect = document.getElementById("styleSelect");
const colsSelect = document.getElementById("colsSelect");

function applyTheme() {
    const color = localStorage.getItem("themeColor") || "#ffb400";
    const style = localStorage.getItem("themeStyle") || "";
    const cols = localStorage.getItem("themeCols") || "4";

    document.documentElement.style.setProperty('--accent', color);
    document.documentElement.style.setProperty('--cols', cols);
    document.body.className = style;

    colorSelect.value = color;
    styleSelect.value = style;
    colsSelect.value = cols;
}

function saveTheme() {
    localStorage.setItem("themeColor", colorSelect.value);
    localStorage.setItem("themeStyle", styleSelect.value);
    localStorage.setItem("themeCols", colsSelect.value);
    applyTheme();
}

colorSelect.onchange = saveTheme;
styleSelect.onchange = saveTheme;
colsSelect.onchange = saveTheme;
</script>

</body>
</html>
