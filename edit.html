<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор Сериалов</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .item { background: #1e1e1e; padding: 10px; border: 1px solid #ffb400; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; }
        input { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; flex: 1; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .add-btn { background: #22c55e; color: white; }
        .save-btn { background: #ffb400; color: black; width: 100%; margin-top: 20px; }
        .token-section { margin-bottom: 30px; padding: 15px; border: 1px dashed #555; }
        .remove-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="color: #ffb400; text-decoration: none;">← Назад к списку</a>
    <h1>Редактор данных</h1>

    <div class="token-section">
        <label>GitHub Token:</label><br>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" style="width: 80%; margin-top: 5px;">
        <p style="font-size: 11px; color: #aaa;">Токен хранится только в вашем браузере.</p>
    </div>

    <div id="items-list"></div>
    
    <button class="btn add-btn" onclick="addItem()">+ Добавить сериал</button>
    <button class="btn save-btn" onclick="saveToGitHub()">💾 СОХРАНИТЬ В GITHUB</button>
</div>

<script>
    const OWNER = "bucketasmr";
    const REPO = "my-serials-data";
    const FILE_PATH = "my-serials.json";
    
    let items = [];

    // Загрузка данных при старте
    window.onload = async () => {
        const savedToken = localStorage.getItem('gh_token');
        if (savedToken) document.getElementById('gh-token').value = savedToken;

        // Загружаем текущий список из GitHub (публичный доступ)
        try {
            const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
            items = await res.json();
            render();
        } catch (e) {
            console.log("Файл пока пуст или не найден");
        }
    };

    function render() {
        const list = document.getElementById('items-list');
        list.innerHTML = "";
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <input type="text" value="${item.name}" oninput="updateItem(${index}, 'name', this.value)" placeholder="Название">
                <input type="text" value="${item.url}" oninput="updateItem(${index}, 'url', this.value)" placeholder="Ссылка">
                <button class="btn remove-btn" onclick="removeItem(${index})">✕</button>
            `;
            list.appendChild(div);
        });
    }

    function addItem() {
        items.push({ name: "", url: "" });
        render();
    }

    function updateItem(index, key, val) {
        items[index][key] = val;
    }

    function removeItem(index) {
        items.splice(index, 1);
        render();
    }

    async function saveToGitHub() {
        const token = document.getElementById('gh-token').value.trim();
        if (!token) return alert("Введите GitHub Token!");
        localStorage.setItem('gh_token', token);

        const btn = document.querySelector('.save-btn');
        btn.textContent = "⌛ Сохранение...";
        btn.disabled = true;

        try {
            // 1. Получаем SHA текущего файла (нужен для обновления)
            const fileInfoRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${token}` }
            });
            const fileData = await fileInfoRes.json();
            const sha = fileData.sha;

            // 2. Кодируем новый контент в Base64
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(items, null, 2))));

            // 3. Отправляем обновление
            const saveRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update serials list via web editor",
                    content: content,
                    sha: sha
                })
            });

            if (saveRes.ok) {
                alert("Успешно сохранено в GitHub! 🚀");
            } else {
                const err = await saveRes.json();
                alert("Ошибка: " + err.message);
            }
        } catch (e) {
            alert("Произошла ошибка при сохранении.");
            console.error(e);
        } finally {
            btn.textContent = "💾 СОХРАНИТЬ В GITHUB";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
