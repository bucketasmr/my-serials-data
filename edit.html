<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать сериалы</title>
<style>
:root { --accent: #ffb400; --bg: #121212; --card: #1e1e1e; }
body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 40px; }
.themeBox { position: fixed; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 100; }
select { background: #1e1e1e; color: white; border: 1px solid var(--accent); padding: 5px; border-radius: 4px; }
.token-box { background: var(--card); border: 1px dashed var(--accent); padding: 15px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
.token-box label { font-size: 11px; color: var(--accent); display: block; margin-bottom: 5px; }
#linksContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; }
input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid var(--accent); border-radius: 6px; background-color: #1e1e1e; color: #fff; box-sizing: border-box; }

.color-row { display: flex; gap: 5px; align-items: center; margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 5px; }
.ln-color { width: 50px !important; height: 35px; padding: 0 !important; cursor: pointer; border: none !important; background: none !important; }
.reset-color { font-size: 10px; padding: 5px; cursor: pointer; background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; }

.button { background-color: var(--card); border: 2px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; text-align: center; }
.button:hover { background: var(--accent); color: black; }
.linkBlock { padding: 15px; border: 1px solid #444; border-radius: 10px; background: rgba(30,30,30,0.8); }
.controls { display: flex; gap: 5px; margin-top: 5px; }

/* Стиль для кнопки массового сброса */
.danger-btn { border-color: #ef4444; color: #ef4444; }
.danger-btn:hover { background: #ef4444; color: white; }
</style>
</head>

<body>
<div class="themeBox">
  <select id="colorSelect">
    <option value="#ffb400">🟠</option>
    <option value="#a855f7">🟣</option>
    <option value="#22c55e">🟢</option>
    <option value="#3b82f6">🔵</option>
    <option value="#ef4444">🔴</option>
    <option value="#ec4899">🌸</option>
  </select>
  <select id="styleSelect"><option value="">Default</option><option value="glass">Glass</option></select>
</div>

<a class="button" href="serials.html">← На главную</a>
<h1>Редактор</h1>

<div class="token-box">
    <label>GITHUB TOKEN</label>
    <input type="password" id="gh-token" placeholder="ghp_xxxx">
</div>

<div style="display:flex; gap:8px; flex-wrap:wrap; justify-content: center; margin-top: 10px;">
  <button class="button saveBtn" onclick="saveAll()">💾 Сохранить везде</button>
  <button class="button" onclick="addNewLink()">➕ Добавить</button>
  <button class="button danger-btn" onclick="resetAllColors()">🔴 Сбросить ВСЕ цвета</button>
  <button class="button" onclick="loadFromCloud()">🔄 Обновить из облака</button>
</div>

<div id="linksContainer"></div>

<script>
const OWNER = "bucketasmr", REPO = "my-serials-data", FILE_PATH = "my-serials.json";
let links = [];
const ghTokenInput = document.getElementById("gh-token");
ghTokenInput.value = localStorage.getItem("gh_token") || "";

function renderInputs() {
  const container = document.getElementById("linksContainer");
  container.innerHTML = "";
  links.forEach((link, i) => {
    const div = document.createElement("div");
    div.className = "linkBlock";
    
    const hasColor = link.color && link.color.startsWith('#');
    const colorVal = hasColor ? link.color : "#ffffff";

    div.innerHTML = `
      <input value="${link.name}" placeholder="Название" class="ln-name">
      <input value="${link.url}" placeholder="Ссылка" class="ln-url">
      <div class="color-row">
        <input type="color" value="${colorVal}" class="ln-color" ${hasColor ? 'data-active="true"' : ''}>
        <button class="reset-color" onclick="resetSingleColor(this)">Сбросить цвет</button>
        <span style="font-size:11px; color:${hasColor ? 'var(--accent)' : '#777'}">${hasColor ? 'ИНДИВИДУАЛЬНЫЙ' : 'ПО ТЕМЕ'}</span>
      </div>
      <div class="controls">
        <button class="button" onclick="moveUp(${i})">⬆</button>
        <button class="button" onclick="moveDown(${i})">⬇</button>
        <button class="button" onclick="deleteLink(${i})">🗑</button>
      </div>`;
    
    const cp = div.querySelector('.ln-color');
    cp.oninput = () => { 
        cp.setAttribute('data-active', 'true'); 
        const status = cp.nextElementSibling.nextElementSibling;
        status.textContent = "ИНДИВИДУАЛЬНЫЙ"; 
        status.style.color = "var(--accent)"; 
    };
    
    container.appendChild(div);
  });
}

// Сброс одного цвета
function resetSingleColor(btn) {
    const cp = btn.previousElementSibling;
    cp.removeAttribute('data-active');
    cp.value = "#ffffff";
    const status = btn.nextElementSibling;
    status.textContent = "ПО ТЕМЕ";
    status.style.color = "#777";
}

// МАССОВЫЙ СБРОС ЦВЕТОВ
function resetAllColors() {
    if(confirm("Вы уверены, что хотите сбросить цвета ВСЕХ кнопок? Они станут зависимы от общей темы.")) {
        // Обновляем текущие данные из инпутов (чтобы не потерять текст), но удаляем цвета
        updateLinksFromInputs();
        links.forEach(link => {
            delete link.color;
        });
        renderInputs();
    }
}

function updateLinksFromInputs() {
  links = [...document.querySelectorAll(".linkBlock")].map(block => {
    const name = block.querySelector(".ln-name").value;
    const url = block.querySelector(".ln-url").value;
    const cp = block.querySelector(".ln-color");
    const obj = { name, url };
    if (cp.hasAttribute('data-active')) obj.color = cp.value;
    return obj;
  });
}

async function saveAll() {
  updateLinksFromInputs();
  const token = ghTokenInput.value.trim();
  localStorage.setItem("myLinks", JSON.stringify(links));
  if(token) localStorage.setItem("gh_token", token);

  if (token) {
    const btn = document.querySelector('.saveBtn');
    btn.textContent = "⌛ Сохранение...";
    try {
      const resInfo = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        headers: { "Authorization": `token ${token}` }
      });
      const fileData = await resInfo.json();
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2))));
      
      const saveRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        method: "PUT",
        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ message: "Update via Editor", content: content, sha: fileData.sha })
      });
      if (saveRes.ok) alert("Успешно сохранено на GitHub! 🚀");
    } catch (e) { alert("Ошибка GitHub: " + e.message); }
    btn.textContent = "💾 Сохранить везде";
  }
}

function addNewLink(){ updateLinksFromInputs(); links.unshift({name:"", url:""}); renderInputs(); }
function deleteLink(i){ if(confirm("Удалить?")){ updateLinksFromInputs(); links.splice(i,1); renderInputs(); } }
function moveUp(i){ if(i>0){ updateLinksFromInputs(); [links[i],links[i-1]]=[links[i-1],links[i]]; renderInputs(); } }
function moveDown(i){ if(i<links.length-1){ updateLinksFromInputs(); [links[i],links[i+1]]=[links[i+1],links[i]]; renderInputs(); } }

async function loadFromCloud() {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
    links = await res.json();
    localStorage.setItem("myLinks", JSON.stringify(links));
    renderInputs();
    alert("Загружено из облака! ☁️");
  } catch (e) { alert("Ошибка загрузки."); }
}

const colorSelect = document.getElementById("colorSelect");
const styleSelect = document.getElementById("styleSelect");

function applyTheme() {
  document.documentElement.style.setProperty('--accent', colorSelect.value);
  document.body.className = styleSelect.value;
  localStorage.setItem("themeColor", colorSelect.value);
  localStorage.setItem("themeStyle", styleSelect.value);
}

colorSelect.value = localStorage.getItem("themeColor") || "#ffb400";
styleSelect.value = localStorage.getItem("themeStyle") || "";
colorSelect.onchange = applyTheme;
styleSelect.onchange = applyTheme;
applyTheme();

links = JSON.parse(localStorage.getItem("myLinks")) || [];
renderInputs();
</script>
</body>
</html>
