<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор Сериалов</title>
    <style>
        :root {
            --accent: #ffb400;
            --bg: #121212;
            --card: #1e1e1e;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 { color: var(--accent); text-align: center; }

        /* Секция токена */
        .token-box {
            background: var(--card);
            border: 1px dashed var(--accent);
            padding: 15 shadow;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
        }

        /* Карточки сериалов */
        .item-card {
            background: var(--card);
            border: 2px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
            transition: 0.2s;
        }

        input {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            flex: 1;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        /* Кнопки в твоем стиле */
        .button {
            box-sizing: border-box;
            background: var(--card);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }

        .button:hover {
            background: var(--accent);
            color: black;
            transform: scale(1.02);
        }

        .btn-add { border-color: #22c55e; color: #22c55e; margin-top: 10px; }
        .btn-add:hover { background: #22c55e; color: white; }

        .btn-save { 
            background: var(--accent); 
            color: black; 
            margin-top: 30px; 
            font-size: 18px;
            width: 100%;
        }

        .btn-remove {
            border-color: #ef4444;
            color: #ef4444;
            padding: 10px 15px;
        }
        .btn-remove:hover { background: #ef4444; color: white; }

        .back-link {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<a href="index.html" class="button back-link">← Назад</a>

<div class="container">
    <h1>Редактор списка 🎬</h1>

    <div class="token-box">
        <label style="font-size: 14px; color: var(--accent);">Ключ доступа (GitHub Token):</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
    </div>

    <div id="items-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
    
    <div style="text-align: center;">
        <button class="button btn-add" onclick="addItem()">+ Добавить новый сериал</button>
    </div>

    <button class="button btn-save" onclick="saveToGitHub()">💾 СОХРАНИТЬ В GITHUB</button>
</div>

<script>
    const OWNER = "bucketasmr";
    const REPO = "my-serials-data";
    const FILE_PATH = "my-serials.json";
    
    let items = [];

    window.onload = async () => {
        const savedToken = localStorage.getItem('gh_token');
        if (savedToken) document.getElementById('gh-token').value = savedToken;

        try {
            const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
            items = await res.json();
            render();
        } catch (e) {
            console.log("Данные не найдены, начинаем с пустого списка");
        }
    };

    function render() {
        const list = document.getElementById('items-list');
        list.innerHTML = "";
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <input type="text" value="${item.name}" oninput="updateItem(${index}, 'name', this.value)" placeholder="Название фильма">
                <input type="text" value="${item.url}" oninput="updateItem(${index}, 'url', this.value)" placeholder="Ссылка на плеер">
                <button class="button btn-remove" onclick="removeItem(${index})">✕</button>
            `;
            list.appendChild(div);
        });
    }

    function addItem() {
        items.push({ name: "", url: "" });
        render();
    }

    function updateItem(index, key, val) {
        items[index][key] = val;
    }

    function removeItem(index) {
        if(confirm("Удалить этот пункт?")) {
            items.splice(index, 1);
            render();
        }
    }

    async function saveToGitHub() {
        const token = document.getElementById('gh-token').value.trim();
        if (!token) return alert("Пожалуйста, введите ваш GitHub Token!");
        
        localStorage.setItem('gh_token', token);
        const btn = document.querySelector('.btn-save');
        btn.textContent = "⌛ Синхронизация...";
        btn.disabled = true;

        try {
            const fileInfoRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${token}` }
            });
            const fileData = await fileInfoRes.json();
            const sha = fileData.sha;

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(items, null, 2))));

            const saveRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Обновление списка сериалов через редактор",
                    content: content,
                    sha: sha
                })
            });

            if (saveRes.ok) {
                alert("Данные успешно отправлены в облако! 🚀");
            } else {
                alert("Ошибка сохранения. Проверьте правильность токена.");
            }
        } catch (e) {
            alert("Ошибка сети или GitHub API.");
        } finally {
            btn.textContent = "💾 СОХРАНИТЬ В GITHUB";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
